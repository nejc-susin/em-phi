services:
  em-phi:
    build: .
    volumes:
      # Mount your config, credentials, token, and decision log here.
      # Run `em-phi setup` locally first to generate token.json.
      - ./data:/data
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EM_PHI_CONFIG: /data/config.yaml
    # Uncomment to run on a schedule via docker-compose (or use cron/systemd instead):
    # restart: "no"
