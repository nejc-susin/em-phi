<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>em-phi — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-gray-900">em-phi</h1>
      <p class="text-sm text-gray-500 mt-1">Self-hosted AI email filter</p>
    </div>
    <form method="post" action="/login/submit" class="bg-white shadow rounded-lg p-8 space-y-4">
      {% if error %}
      <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2">{{ error }}</p>
      {% endif %}
      <div>
        <label for="token" class="block text-sm font-medium text-gray-700 mb-1">Access token</label>
        <input
          id="token" name="token" type="password" required autofocus
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="your-auth-token"
        >
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded transition-colors">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
