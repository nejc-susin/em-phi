# em-phi configuration
# Copy to config.yaml and fill in your values.
# config.yaml is gitignored — never commit it with real credentials.

# Email provider. All provider-specific settings nest under this block.
# Built-in: gmail. Custom: add src/em_phi/providers/myprovider.py with
# create(config) -> EmailProvider, then set name: myprovider here.
email_provider:
  name: gmail
  credentials_file: credentials.json   # OAuth2 client credentials (from Google Cloud Console)
  token_file: token.json               # Auto-managed refresh token (created by `em-phi setup`)
  # fetch_label: "ToFilter"            # optional: only process emails carrying this Gmail label

# LLM classifier. All LLM-specific settings nest under this block.
# Built-in: claude. Custom: add src/em_phi/classifiers/myclassifier.py with
# create(config) -> Classifier, then set name: myclassifier here.
llm:
  name: claude
  model: claude-haiku-4-5-20251001     # Claude Haiku is recommended for cost efficiency
  max_tokens: 256

labels:
  relevant: "EmPhi/Relevant"           # Applied to emails the LLM considers relevant
  irrelevant: "EmPhi/Irrelevant"       # Applied to emails the LLM considers irrelevant

decision_log:
  path: decisions.db                   # SQLite database path (relative to this file's directory)

# logging:
#   level: WARNING    # DEBUG | INFO | WARNING | ERROR (default: WARNING = silent)
#   file: null        # optional path; writes timestamped log there in addition to console

# schedule:           # only used in web mode (em-phi serve). Ignored by em-phi run.
#   enabled: false
#   interval_hours: 6
#   # cron: "0 */6 * * *"   # cron expression; takes precedence over interval_hours if set

# web:                # required to use em-phi serve. Remove or omit for headless cron mode.
#   host: 127.0.0.1
#   port: 8080
#   auth_token: change-me   # CHANGE THIS — protects the config editor and run controls

senders:
  # One entry per newsletter sender.
  # 'interests' is a natural-language description of what you want to see from this sender.
  # 'tolerance' controls how aggressively irrelevant emails are filtered:
  #   aggressive  — archive anything not clearly relevant; when in doubt, archive
  #   balanced    — keep somewhat relevant emails; archive only clearly irrelevant ones
  #   conservative — keep anything even slightly relevant; archive only obvious misses
  # 'action' controls what happens to irrelevant emails:
  #   label   — apply the irrelevant label only (safe default while you build trust)
  #   archive — label + remove from inbox

  - email: newsletter@example.com
    name: "Example Newsletter"
    interests: |
      I care about Python releases, security updates, and new PEP proposals.
      I don't care about community events, job postings, or merchandise.
    tolerance: balanced
    action: label

  - email: weekly@techdigest.com
    name: "Tech Digest"
    interests: |
      I want articles about distributed systems, database internals, and Rust.
      Skip anything about AI hype, crypto, or social media trends.
    tolerance: conservative
    action: label
